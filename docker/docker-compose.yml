services:
  chrome:
    build:
      context: .
      dockerfile: Dockerfile.chrome
    container_name: hkmindex-chrome
    ports:
      - "5900:5900"
      - "6080:6080"
      - "9222:9222"
    shm_size: "2gb"
    restart: unless-stopped
    environment:
      - VNC_PASSWORD=123456

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: hkmindex-app
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=change-me-please
      - APP_PASSWORD=admin123
      - CHROME_CDP_URL=http://chrome:9222
    depends_on:
      - chrome
    restart: unless-stopped